<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bravo Roots • Atendimento no WhatsApp</title>

  <style>
    :root {
      --gold: #d4af37;
      --gold-dark: #b8962e;
      --green: #1f7a4f;
      --bg-dark: #0b1220;
      --card: #0f172a;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(1200px 600px at 10% 10%, #10203a, transparent),
                  linear-gradient(135deg, #020617, #0b1220);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)) , var(--card);
      border-radius: 22px;
      padding: 36px 28px 30px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,.5);
      border: 1px solid rgba(212,175,55,.15);
      position: relative;
      overflow: hidden;
    }

    .card::after{
      content:'';
      position:absolute;
      inset:auto -40% -60% -40%;
      height:140%;
      background: radial-gradient(closest-side, rgba(212,175,55,.12), transparent 60%);
      pointer-events:none;
    }

.logo-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 14px;
  position: relative;
  left: -6px; /* ajusta o valor até ficar centralizado */
}

.logo {
  width: auto;
  max-width: 220px;
  max-height: 120px;
  height: auto;
  object-fit: contain;
  display: block;
  margin: 0 auto 8px;
  filter: drop-shadow(0 10px 25px rgba(212,175,55,.45));
}
    h1 {
      margin: 10px 0 6px;
      font-size: 26px;
      letter-spacing: .3px;
      color: #f1e9c9;
    }

    .tagline {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .cta {
      width: 100%;
      padding: 16px 18px;
      font-size: 18px;
      font-weight: 800;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      color: #102015;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      box-shadow: 0 14px 30px rgba(212,175,55,.35), inset 0 1px 0 rgba(255,255,255,.35);
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }

    .cta:hover {
      transform: translateY(-2px);
      filter: saturate(1.05);
      box-shadow: 0 18px 40px rgba(212,175,55,.45), inset 0 1px 0 rgba(255,255,255,.45);
    }

    .badges {
      display:flex;
      gap:10px;
      justify-content:center;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      color: #dbe7e1;
      border: 1px solid rgba(31,122,79,.35);
      background: rgba(31,122,79,.15);
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: #7aa38f;
    }
  </style>
</head>
<body>

  <main class="card">
    <div class="logo-wrap">
      <!-- Coloque a imagem da logo no repositório com o nome: logo.png -->
      <img src="2b520a90-571d-4a13-bb1c-3de4377417fc-removebg-preview.png" />
    </div>

    <h1>Bravo Roots</h1>
    <p class="tagline">Atendimento rápido direto no WhatsApp</p>

    <button class="cta" onclick="abrirWhatsapp()">Falar com a Bravo Roots</button>

    <div class="badges">
      <span class="badge">Resposta rápida</span>
      <span class="badge">Atendimento humano</span>
      <span class="badge">Suporte via WhatsApp</span>
    </div>

    <div class="footer">
      © Bravo Roots
    </div>
  </main>

  <script>
    const numeros = [
      "5511978761833", // SEU WHATSAPP
      "5511997227028"  // WHATSAPP DO SEU AMIGO
    ];

    function abrirWhatsapp() {
      let ultimo = localStorage.getItem("ultimoAtendido");
      let proximo = ultimo === "0" ? 1 : 0;

      localStorage.setItem("ultimoAtendido", proximo);

      const numero = numeros[proximo];
      const msg = encodeURIComponent("Oi! Vim pelo Instagram e gostaria de atendimento da Bravo Roots.");
      window.location.href = `https://wa.me/${numero}?text=${msg}`;
    }
  </script>

</body>
</html>
